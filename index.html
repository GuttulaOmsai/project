<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-amber: #fbbf24;
            --accent-red: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        header h1 {
            color: var(--accent-blue);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 25px;
        }

        /* Navigation Sidebar */
        .sidebar {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 20px;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: var(--text-main);
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .nav-group {
            margin-bottom: 20px;
        }

        .nav-group-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-blue);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 10px 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .nav-btn:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-main);
        }

        .nav-btn.active {
            background-color: var(--accent-blue);
            color: var(--bg-primary);
            font-weight: bold;
        }

        /* Main Content Viewport */
        .main-viewport {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Animation & Mimic Panel Screen */
        .mimic-panel {
            background-color: #020617;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .mimic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .reactor-id {
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1rem;
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
        }

        .live-status-pill {
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--accent-green);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-status-pill::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Animated Graphic Display Area */
        .animation-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 15px 0;
            flex-grow: 1;
        }

        .vessel-graphic {
            width: 90px;
            height: 110px;
            border: 3px solid #94a3b8;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            position: relative;
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vessel-fluid {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: rgba(56, 189, 248, 0.3);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            transition: all 0.5s ease;
        }

        .vessel-fluid.agitating {
            animation: wave 1s infinite linear;
        }

        @keyframes wave {
            0%, 100% { transform: skewY(0deg); }
            50% { transform: skewY(3deg); }
        }

        .pipe-line {
            height: 6px;
            background: #475569;
            flex-grow: 1;
            position: relative;
        }

        .pipe-line.active-flow::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            animation: flow 1.5s infinite linear;
            background-size: 200% 100%;
        }

        @keyframes flow {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        /* Dashboard Parameter Panels */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .param-card {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .param-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .param-value {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: var(--text-main);
            margin-top: 4px;
        }

        /* Alerts & Alarms Display */
        .alert-box {
            background-color: rgba(248, 113, 113, 0.15);
            border: 1px solid var(--accent-red);
            border-radius: 6px;
            padding: 12px 15px;
            margin-top: 15px;
            color: #fca5a5;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .alert-box.warning {
            background-color: rgba(251, 191, 36, 0.15);
            border: 1px solid var(--accent-amber);
            color: #fde047;
        }

        /* Process Steps Documentation Layout */
        .process-details-section {
            margin-top: 35px;
        }

        .process-details-section h2 {
            font-size: 1.6rem;
            color: var(--accent-blue);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-tertiary);
            padding-bottom: 8px;
        }

        .step-block {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-blue);
        }

        .step-block h4 {
            font-size: 1.15rem;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--bg-tertiary);
            color: var(--accent-blue);
            font-family: monospace;
        }

        .sub-steps-list {
            list-style: none;
            padding-left: 5px;
        }

        .sub-steps-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .sub-steps-list li::before {
            content: "•";
            color: var(--accent-blue);
            font-weight: bold;
            position: absolute;
            left: 0;
            top: 0;
            font-size: 1.2rem;
        }

        .highlight-text {
            color: var(--accent-amber);
            font-weight: 600;
        }

        /* Decision Interface Controls */
        .decision-block {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: filter 0.2s;
        }

        .action-btn.confirm { background-color: var(--accent-green); color: #000; }
        .action-btn.reject { background-color: var(--accent-red); color: #fff; }
        .action-btn:hover { filter: brightness(1.1); }

        /* Responsive Breakpoints */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
                width: 100%;
            }
        }
    </style>
</head>
